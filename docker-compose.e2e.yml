services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://e2e:e2e@postgres:5432/e2e
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIREBASE_PROJECT_ID: e2e-test
      E2E_BYPASS_AUTH: "1"
      UPLOAD_DIR: /app/uploads
    volumes:
      - e2e_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    environment:
      VITE_E2E_AUTH: "1"
      VITE_API_BASE_URL: "http://backend:8000"
      VITE_FIREBASE_API_KEY: placeholder
      VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: placeholder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  e2e_uploads:
