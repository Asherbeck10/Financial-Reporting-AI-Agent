name: CI

on:
  push:
  pull_request:

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          docker system prune -af --volumes
          df -h

      - name: Start stack
        run: docker compose -p e2e -f docker-compose.e2e.yml up -d --build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for backend
        run: timeout 180 sh -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'

      - name: Wait for frontend
        run: timeout 180 sh -c 'until curl -sf http://localhost:5173; do sleep 3; done'

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: e2e
        run: npm test

      - name: Print container logs on failure
        if: failure()
        run: |
          echo "=== backend ===" && docker compose -p e2e -f docker-compose.e2e.yml logs backend || true
          echo "=== frontend ===" && docker compose -p e2e -f docker-compose.e2e.yml logs frontend || true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Tear down stack
        if: always()
        run: docker compose -p e2e -f docker-compose.e2e.yml down -v
